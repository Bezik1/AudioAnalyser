name: Project Tests

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache Homebrew
      uses: actions/cache@v3
      with:
        path: |
          ~/Library/Caches/Homebrew
          /usr/local/var/homebrew
        key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/tests.yml') }}
        restore-keys: |
          ${{ runner.os }}-brew-

    - name: Install dependencies
      run: |
        brew install cmake ninja qt6 googletest google-benchmark

    - name: Configure project
      run: |
        cmake -S . -B build \
          -G Ninja \
          -DCMAKE_PREFIX_PATH=$(brew --prefix qt6) \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build tests
      run: |
        cmake --build build --target unit-tests --parallel $(sysctl -n hw.ncpu)

    - name: Run unit-tests
      run: |
        ctest --test-dir build -R unit-tests -V

    - name: Build benchmark-tests
      run: |
        cmake --build build --target benchmark-tests --parallel $(sysctl -n hw.ncpu)

    - name: Run benchmark-tests and verify complexity
      run: |
        OUTPUT=$(ctest --test-dir build -R benchmark-tests -V)
        echo "$OUTPUT"

        echo "$OUTPUT" | awk '
        /RMS/ {
            if ($2 + 0 > 20) {
                print "Complexity RMS check failed (exceeded 20% threshold):"
                print $0
                exit 1
            }
        }'