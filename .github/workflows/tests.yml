name: Project Tests

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache Homebrew
      uses: actions/cache@v3
      with:
        path: |
          ~/Library/Caches/Homebrew
          /usr/local/var/homebrew
        key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/tests.yml') }}
        restore-keys: |
          ${{ runner.os }}-brew-

    - name: Install dependencies
      run: |
        brew install cmake ninja qt6 googletest google-benchmark

    - name: Configure project
      run: |
        cmake -S . -B build \
          -G Ninja \
          -DCMAKE_PREFIX_PATH=$(brew --prefix qt6) \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build tests
      run: |
        cmake --build build --target tests --parallel $(sysctl -n hw.ncpu)

    - name: Run tests
      run: |
        ./build/tests

    - name: Build benchmarks
      run: |
        cmake --build build --target benchmarks --parallel $(sysctl -n hw.ncpu)

    - name: Run benchmarks and verify complexity
      run: |        
        OUTPUT=$(./build/benchmarks)
        echo "$OUTPUT"
        
        if echo "$OUTPUT" | grep "RMS" | awk '{ if ($2 > 10) exit 1 }'; then
          echo "Complexity RMS check passed."
        else
          echo "Complexity RMS check failed (exceeded 10% threeshold)!"
          exit 1
        fi